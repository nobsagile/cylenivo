name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bun-target: bun-windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bun-target: bun-linux-x64-baseline

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION != tauri.conf.json $CONF_VERSION — run 'npm version' before tagging."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install frontend deps
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: bun install

      - name: Run frontend tests
        run: npm test

      - name: Run server tests
        working-directory: server
        run: bun test

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set +o pipefail
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s" "$PREV".."${{ github.ref_name }}" | grep -v "^- ${{ github.ref_name }}" | sed 's/^- v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*: /- /' || true)
          else
            BODY=$(git log --pretty=format:"- %s" | grep -v "^- ${{ github.ref_name }}" | sed 's/^- v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*: /- /' || true)
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build server binary (Mac/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: server
        run: bun build --compile --target=${{ matrix.bun-target }} src/index.ts --outfile ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}

      - name: Build server binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: server
        run: bun build --compile --target=${{ matrix.bun-target }} src/index.ts --outfile ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}.exe

      - name: Smoke-test server binary (Mac/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: server
        env:
          DB_PATH: ":memory:"
          SERVER_PORT: "9999"
        run: |
          timeout 3 ../src-tauri/binaries/cylenivo-server-${{ matrix.target }} || \
          [ $? -eq 124 ] || (echo "::error::Server binary failed to start" && exit 1)

      - name: Smoke-test server binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: server
        env:
          DB_PATH: ":memory:"
          SERVER_PORT: "9999"
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "..\src-tauri\binaries\cylenivo-server-${{ matrix.target }}.exe" -PassThru -NoNewWindow
          Start-Sleep -Seconds 3
          if ($proc.HasExited -and $proc.ExitCode -ne 0) {
            Write-Error "Server binary failed to start (exit $($proc.ExitCode))"
            exit 1
          }
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cylenivo ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}${{ matrix.os == 'ubuntu-22.04' && ' --bundles deb,rpm' || '' }}

  package-arch:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Wait for .deb asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in $(seq 1 30); do
            DEB_URL=$(gh release view "${{ github.ref_name }}" --json assets \
              --jq '.assets[] | select(.name | endswith("_amd64.deb")) | .url' 2>/dev/null || true)
            if [ -n "$DEB_URL" ]; then
              echo "DEB_URL=$DEB_URL" >> $GITHUB_ENV
              echo "Asset found: $DEB_URL"; break
            fi
            echo "Waiting... ($i/30)"; sleep 10
          done
          if [ -z "$DEB_URL" ]; then echo "::error::.deb not found after 5min"; exit 1; fi

      - name: Build Arch package
        run: |
          DEB_NAME=$(basename "$DEB_URL")
          VERSION=$(echo "$DEB_NAME" | sed 's/Cylenivo_\(.*\)_amd64\.deb/\1/')
          echo "Building Arch package for version $VERSION from $DEB_URL"

          docker run --rm -v "$PWD/packaging/aur:/work" archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel curl &&
            useradd -m builder &&
            chown -R builder /work &&
            cd /work &&
            sed -i 's/^pkgver=.*/pkgver=${VERSION}/' PKGBUILD &&
            sed -i 's|^source_x86_64=.*|source_x86_64=(\"cylenivo.deb::${DEB_URL}\")|' PKGBUILD &&
            SHA256=\$(curl -sL '${DEB_URL}' | sha256sum | awk '{print \$1}') &&
            sed -i \"s/sha256sums_x86_64=('.*')/sha256sums_x86_64=('\${SHA256}')/\" PKGBUILD &&
            sed -i 's/\\\${pkgname}-\\\${pkgver}/cylenivo/' PKGBUILD &&
            su -s /bin/bash builder -c 'cd /work && makepkg --nodeps --noconfirm --noprogressbar'
          "

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packaging/aur/cylenivo-bin-*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
