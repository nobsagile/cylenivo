name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bun-target: bun-windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bun-target: bun-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install frontend deps
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: bun install

      - name: Run frontend tests
        run: npm test

      - name: Run server tests
        working-directory: server
        run: bun test

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set +o pipefail
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -n "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s" "$PREV".."${{ github.ref_name }}" | grep -v "^- ${{ github.ref_name }}" || true)
          else
            BODY=$(git log --pretty=format:"- %s" | grep -v "^- ${{ github.ref_name }}" || true)
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build server binary (Mac/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: server
        run: bun build --compile --target=${{ matrix.bun-target }} src/index.ts --outfile ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}

      - name: Build server binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: server
        run: bun build --compile --target=${{ matrix.bun-target }} src/index.ts --outfile ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cylenivo ${{ github.ref_name }}'
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}${{ matrix.os == 'ubuntu-22.04' && ' --bundles deb,rpm' || '' }}

  package-arch:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Wait for .deb asset to be available
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DEB_URL="https://github.com/nobsagile/cylenivo/releases/download/${{ github.ref_name }}/Cylenivo_${VERSION}_amd64.deb"
          for i in $(seq 1 12); do
            if curl -fsL --head "$DEB_URL" > /dev/null 2>&1; then
              echo "Asset available"; break
            fi
            echo "Waiting... ($i/12)"; sleep 10
          done

      - name: Build Arch package
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DEB_URL="https://github.com/nobsagile/cylenivo/releases/download/${{ github.ref_name }}/Cylenivo_${VERSION}_amd64.deb"

          docker run --rm -v "$PWD/packaging/aur:/work" archlinux:latest bash -c "
            pacman -Syu --noconfirm base-devel curl &&
            useradd -m builder &&
            chown -R builder /work &&
            cd /work &&
            sed -i 's/^pkgver=.*/pkgver=${VERSION}/' PKGBUILD &&
            SHA256=\$(curl -sL '${DEB_URL}' | sha256sum | awk '{print \$1}') &&
            sed -i \"s/sha256sums_x86_64=('.*')/sha256sums_x86_64=('\${SHA256}')/\" PKGBUILD &&
            su -s /bin/bash builder -c 'cd /work && makepkg --nodeps --noconfirm --noprogressbar'
          "

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: packaging/aur/cylenivo-bin-*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
