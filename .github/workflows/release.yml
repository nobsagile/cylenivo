name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            server-pkg-target: node20-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            server-pkg-target: node20-win-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            server-pkg-target: node20-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Build server bundle
        working-directory: server
        run: npm run build:bundle

      - name: Build server binary (Mac/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: server
        run: |
          npx @yao-pkg/pkg dist/bundle.cjs \
            --targets ${{ matrix.server-pkg-target }} \
            --output ../src-tauri/binaries/cylenivo-server-${{ matrix.target }} \
            --config package.json \
            --public \
            --public-packages "*"

      - name: Build server binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: server
        run: |
          npx @yao-pkg/pkg dist/bundle.cjs `
            --targets ${{ matrix.server-pkg-target }} `
            --output ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}.exe `
            --config package.json `
            --public `
            --public-packages "*"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cylenivo ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
