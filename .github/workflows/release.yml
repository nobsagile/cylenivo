name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bun-target: bun-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bun-target: bun-windows-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bun-target: bun-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install frontend deps
        run: npm ci

      - name: Install server deps
        working-directory: server
        run: bun install

      - name: Run frontend tests
        run: npm test

      - name: Run server tests
        working-directory: server
        run: bun test

      - name: Build server binary (Mac/Linux)
        if: matrix.os != 'windows-latest'
        working-directory: server
        run: bun build --compile --target=${{ matrix.bun-target }} src/index.ts --outfile ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}

      - name: Build server binary (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: server
        run: bun build --compile --target=${{ matrix.bun-target }} src/index.ts --outfile ../src-tauri/binaries/cylenivo-server-${{ matrix.target }}.exe

      - name: Debug sidecar binary (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          echo "=== file ===" && file src-tauri/binaries/cylenivo-server-x86_64-unknown-linux-gnu
          echo "=== size ===" && ls -lh src-tauri/binaries/cylenivo-server-x86_64-unknown-linux-gnu
          echo "=== ldd ===" && ldd src-tauri/binaries/cylenivo-server-x86_64-unknown-linux-gnu || true
          echo "=== patchelf --print-needed ===" && patchelf --print-needed src-tauri/binaries/cylenivo-server-x86_64-unknown-linux-gnu || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: "1"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Cylenivo ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
